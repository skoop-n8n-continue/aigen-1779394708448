<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vape Mondays</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('https://skoop-general.s3.us-east-1.amazonaws.com/1779394723637-TmwxZfRN-fqtQCpm67zoME5og4rhk4opFizxcdYFp-s%3D_skoop_media_abbea8f473bce245ee9b93d4266e61a3_86751226.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Overlay to make text more readable */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
            padding: 40px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
        }

        .discount {
            font-size: 12vw;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -2px;
            animation: pulse 2s infinite ease-in-out, glow 2s infinite alternate;
        }

        .product {
            font-size: 8vw;
            font-weight: 800;
            margin: 10px 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: slideInLeft 1s ease-out forwards;
            opacity: 0;
        }

        .day {
            font-size: 5vw;
            font-weight: 600;
            margin: 0;
            padding: 10px 30px;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: slideInRight 1s ease-out 0.5s forwards;
            opacity: 0;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #ff00de, 0 0 40px #ff00de, 0 0 50px #ff00de, 0 0 60px #ff00de; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ff4da6, 0 0 40px #ff4da6, 0 0 50px #ff4da6, 0 0 60px #ff4da6, 0 0 70px #ff4da6; }
        }

        @keyframes slideInLeft {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 5s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="overlay"></div>
        <div class="particles" id="particles"></div>
        <div class="content">
            <h1 class="discount">10% OFF</h1>
            <h2 class="product">ALL VAPES</h2>
            <p class="day">Every Monday</p>
        </div>
    </div>

    <script>
        // Create floating particles for extra effect
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');

                    // Random properties
                    const size = Math.random() * 15 + 5;
                    const posX = Math.random() * 100;
                    const delay = Math.random() * 5;
                    const duration = Math.random() * 3 + 4;

                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    particle.style.left = `${posX}%`;
                    particle.style.bottom = '-20px';
                    particle.style.animationDuration = `${duration}s`;
                    particle.style.animationDelay = `${delay}s`;

                    particlesContainer.appendChild(particle);

                    // Remove and recreate particle after animation
                    setTimeout(() => {
                        particle.remove();
                        createSingleParticle(particlesContainer);
                    }, (duration + delay) * 1000);
                }, i * 200); // Stagger creation
            }
        }

        function createSingleParticle(container) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            const size = Math.random() * 15 + 5;
            const posX = Math.random() * 100;
            const duration = Math.random() * 3 + 4;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${posX}%`;
            particle.style.bottom = '-20px';
            particle.style.animationDuration = `${duration}s`;

            container.appendChild(particle);

            setTimeout(() => {
                particle.remove();
                createSingleParticle(container);
            }, duration * 1000);
        }

        // Initialize particles
        document.addEventListener('DOMContentLoaded', createParticles);
    </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
